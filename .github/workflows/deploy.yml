name: Deploy to VPS

# Chạy tự động khi code được merge vào main (vd: sau khi merge một PR).
# Cũng có thể bấm chạy tay trong tab Actions (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Không cho 2 lần deploy chạy chồng lên nhau; lần sau đợi lần trước xong.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${VPS_PORT:-22}" \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '${VPS_APP_DIR}' && bash scripts/deploy-vps.sh"

kind = "web"
previewPath = "/"
title = "AI Marketing Strategist"
version = "1.0.0"
id = "artifacts/marketing-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25846
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/marketing-platform run dev"

[services.env]
PORT = "25846"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/marketing-platform", "run", "build"]
publicDir = "artifacts/marketing-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

    # ── Brand ads context ───────────────────────────────────────────────────
    BrandAdsContext:
      type: object
      description: Free-form brand metadata used to ground Ads Strategy Agent prompts.
      properties:
        uniqueSellingPoints:
          type: array
          items: { type: string }
        competitors:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              url: { type: ["string", "null"] }
              notes: { type: ["string", "null"] }
            required: [name]
        pricePositioning:
          type: ["string", "null"]
          enum: [budget, mid, premium, luxury, null]
        bookingUrl: { type: ["string", "null"] }
        metaPixelId: { type: ["string", "null"] }
        googleAdsCustomerId: { type: ["string", "null"] }
        primaryRegions:
          type: array
          items: { type: string }
        excludedRegions:
          type: array
          items: { type: string }
        primaryLanguages:
          type: array
          items: { type: string }
        notes: { type: ["string", "null"] }

    BrandAdsContextEnvelope:
      type: object
      description: Wraps ads_context with the two scalar columns we put on brands at the same time.
      properties:
        brandId: { type: integer }
        adsContext:
          oneOf:
            - $ref: "#/components/schemas/BrandAdsContext"
            - type: "null"
        serviceRadiusKm: { type: ["integer", "null"] }
        avgTicketSizeEur:
          type: ["string", "null"]
          description: Decimal(10,2) returned as string for precision
        updatedAt: { type: string, format: date-time }
      required:
        - brandId
        - adsContext
        - serviceRadiusKm
        - avgTicketSizeEur
        - updatedAt

    UpdateBrandAdsContextBody:
      type: object
      properties:
        adsContext:
          oneOf:
            - $ref: "#/components/schemas/BrandAdsContext"
            - type: "null"
        serviceRadiusKm: { type: ["integer", "null"] }
        avgTicketSizeEur:
          type: ["string", "null"]
          description: Decimal(10,2) as string (e.g. "45.00")

    # ── Ads Strategy Agent ──────────────────────────────────────────────────
    AdsModule:
      type: string
      enum: [audience, keyword, performance, trend]
      description: Which Ads Strategy module produced the report

    AdsAiProvider:
      type: string
      enum: [anthropic, google, openai, xai]

    AdsReport:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: integer }
        module: { $ref: "#/components/schemas/AdsModule" }
        input:
          type: object
          additionalProperties: true
          description: Raw input the user submitted (form values + brand snapshot)
        output:
          type: object
          additionalProperties: true
          description: AI-generated, schema-validated output. Shape depends on `module`.
        aiProvider: { $ref: "#/components/schemas/AdsAiProvider" }
        aiModel: { type: string }
        tokensInput: { type: ["integer", "null"] }
        tokensOutput: { type: ["integer", "null"] }
        costEur: { type: ["string", "null"], description: "Decimal(10,4) as string for precision" }
        latencyMs: { type: ["integer", "null"] }
        userNotes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - brandId
        - module
        - input
        - output
        - aiProvider
        - aiModel
        - tokensInput
        - tokensOutput
        - costEur
        - latencyMs
        - userNotes
        - createdAt
        - updatedAt

    GenerateAdsAudienceBody:
      type: object
      properties:
        brandId: { type: integer }
        service:
          type: string
          description: Specific service / product to target (e.g. "Gel-Nägel Sommer 2026")
        campaignGoal:
          type: string
          enum: [awareness, traffic, leads, conversions, retention]
        budgetEur:
          type: ["number", "null"]
          description: Optional monthly ads budget in EUR for budget split suggestions
        outputLanguage:
          type: string
          enum: [de, vi, en]
          default: de
        bypassCache:
          type: boolean
          default: false
          description: Skip the 7-day cache lookup and force a fresh AI call
      required:
        - brandId
        - service
        - campaignGoal

    GenerateAdsKeywordsBody:
      type: object
      properties:
        brandId: { type: integer }
        service: { type: string }
        competitors:
          type: array
          items: { type: string }
          description: Optional competitor names to exclude / negative-target
        outputLanguage:
          type: string
          enum: [de, vi, en]
          default: de
        bypassCache:
          type: boolean
          default: false
          description: Skip the 7-day cache lookup and force a fresh AI call
      required:
        - brandId
        - service

    AnalyzeAdsPerformanceBody:
      type: object
      properties:
        brandId: { type: integer }
        platform:
          type: string
          enum: [meta, google, mixed]
        csvData:
          type: string
          description: Raw CSV exported from Meta Ads Manager / Google Ads Editor (max 10MB)
        goal:
          type: object
          properties:
            cplTargetEur: { type: ["number", "null"] }
            avgTicketEur: { type: ["number", "null"] }
            roasTarget: { type: ["number", "null"] }
        outputLanguage:
          type: string
          enum: [de, vi, en]
          default: de
        bypassCache:
          type: boolean
          default: false
          description: Skip the 7-day cache lookup and force a fresh AI call
      required:
        - brandId
        - platform
        - csvData

    GetAdsTrendBody:
      type: object
      properties:
        brandId: { type: integer }
        regionFocus:
          type: string
          description: Region to scope trend search (e.g. "Bayern", "Allgäu")
        topic:
          type: ["string", "null"]
          description: Optional topic seed (e.g. "Nail Trends 2026")
        outputLanguage:
          type: string
          enum: [de, vi, en]
          default: de
        bypassCache:
          type: boolean
          default: false
          description: Skip the 7-day cache lookup and force a fresh AI call
      required:
        - brandId
        - regionFocus

    UpdateAdsReportBody:
      type: object
      properties:
        userNotes:
          type: ["string", "null"]
      required:
        - userNotes

    AdsCostBucket:
      type: object
      properties:
        aiProvider: { $ref: "#/components/schemas/AdsAiProvider" }
        aiModel: { type: string }
        module: { $ref: "#/components/schemas/AdsModule" }
        callCount: { type: integer }
        totalTokensInput: { type: integer }
        totalTokensOutput: { type: integer }
        totalCostEur: { type: string, description: "Decimal(10,4) as string" }
      required:
        - aiProvider
        - aiModel
        - module
        - callCount
        - totalTokensInput
        - totalTokensOutput
        - totalCostEur

    # ── Auto-Reply Engine (Phase G) ───────────────────────────────────────────
    ReplyPlatform:
      type: string
      enum: [google, facebook, instagram, messenger]

    ReplyIntent:
      type: string
      enum: [booking, price, complaint, compliment, other]

    ReplyStatus:
      type: string
      enum: [pending, auto_sent, manual_sent, escalated, skipped]

    ReplyQueueItem:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: integer }
        platform: { $ref: "#/components/schemas/ReplyPlatform" }
        externalId: { type: ["string", "null"] }
        reviewId: { type: ["integer", "null"] }
        authorName: { type: ["string", "null"] }
        rating: { type: ["integer", "null"] }
        originalMessage: { type: ["string", "null"] }
        suggestedReply: { type: ["string", "null"] }
        replyMode: { type: ["string", "null"], enum: [public, private, null] }
        intent: { oneOf: [{ $ref: "#/components/schemas/ReplyIntent" }, { type: "null" }] }
        sentiment: { type: ["string", "null"], description: "Decimal(3,2) as string, -1.00..1.00" }
        status: { $ref: "#/components/schemas/ReplyStatus" }
        statusReason: { type: ["string", "null"] }
        sentReply: { type: ["string", "null"] }
        sentAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - brandId
        - platform
        - status
        - createdAt
        - updatedAt

    UpdateReplyQueueBody:
      type: object
      properties:
        suggestedReply: { type: ["string", "null"] }
        status:
          type: ["string", "null"]
          enum: [pending, skipped, null]
          description: Only manual transitions are allowed here (e.g. skip a row)

    SendReplyBody:
      type: object
      properties:
        replyText:
          type: ["string", "null"]
          description: Override text to send. Defaults to the stored suggestedReply.

    AutoReplyStats:
      type: object
      properties:
        autoRepliedToday: { type: integer }
        pending: { type: integer }
        escalated: { type: integer }
        avgResponseMinutes: { type: ["number", "null"] }
      required:
        - autoRepliedToday
        - pending
        - escalated
        - avgResponseMinutes

    AutoReplySettings:
      type: object
      properties:
        brandId: { type: integer }
        googleEnabled: { type: boolean }
        fbCommentsEnabled: { type: boolean }
        igCommentsEnabled: { type: boolean }
        dailyCap: { type: integer }
        escalateThreshold: { type: integer }
      required:
        - brandId
        - googleEnabled
        - fbCommentsEnabled
        - igCommentsEnabled
        - dailyCap
        - escalateThreshold

    UpdateAutoReplySettingsBody:
      type: object
      properties:
        googleEnabled: { type: boolean }
        fbCommentsEnabled: { type: boolean }
        igCommentsEnabled: { type: boolean }
        dailyCap: { type: integer, minimum: 1, maximum: 500 }
        escalateThreshold: { type: integer, minimum: 0, maximum: 5 }

    # ── Strategy Inbox (Phase B) ──────────────────────────────────────────────
    StrategyInputType:
      type: string
      enum: [campaign_idea, company_goal, format_test, feedback, other]

    StrategyPriority:
      type: string
      enum: [high, medium, low]

    StrategyStatus:
      type: string
      enum: [pending, analyzed, incorporated, archived]

    StrategyAnalysis:
      type: object
      properties:
        summary: { type: string }
        feasibility:
          type: object
          properties:
            rating: { type: string, enum: [high, medium, low] }
            rationale: { type: string }
          required: [rating, rationale]
        timeline: { type: string }
        resources: { type: array, items: { type: string } }
        risks: { type: array, items: { type: string } }
        recommendedWeek: { type: string }
        alignsWithTrends: { type: ["string", "null"] }
      required: [summary, feasibility, timeline, resources, risks, recommendedWeek]

    StrategyInboxItem:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: ["integer", "null"] }
        inputType: { $ref: "#/components/schemas/StrategyInputType" }
        content: { type: string }
        priority: { $ref: "#/components/schemas/StrategyPriority" }
        deadline: { type: ["string", "null"], format: date }
        claudeAnalysis:
          oneOf:
            - $ref: "#/components/schemas/StrategyAnalysis"
            - type: "null"
        status: { $ref: "#/components/schemas/StrategyStatus" }
        incorporatedInWeek: { type: ["integer", "null"] }
        tokensInput: { type: ["integer", "null"] }
        tokensOutput: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - brandId
        - inputType
        - content
        - priority
        - status
        - createdAt
        - updatedAt

    CreateStrategyInboxBody:
      type: object
      properties:
        brandId:
          type: ["integer", "null"]
          description: null = applies to all brands
        inputType: { $ref: "#/components/schemas/StrategyInputType" }
        content: { type: string, minLength: 1 }
        priority: { $ref: "#/components/schemas/StrategyPriority" }
        deadline: { type: ["string", "null"], format: date }
      required: [inputType, content]

    UpdateStrategyInboxBody:
      type: object
      properties:
        status: { $ref: "#/components/schemas/StrategyStatus" }
        incorporatedInWeek: { type: ["integer", "null"] }
        priority: { $ref: "#/components/schemas/StrategyPriority" }


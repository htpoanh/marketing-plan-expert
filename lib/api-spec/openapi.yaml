                required: [inserted]
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /market-intelligence:
    get:
      operationId: listMarketIntelligence
      tags: [marketIntelligence]

  # ── Ads Performance (Phase A) ───────────────────────────────────────────────
  /ads-performance/scan:
    post:
      operationId: scanAdsPerformance
      tags: [adsPerformance]
      summary: Run ad-platform readers for a brand (inactive readers reported, not saved)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brandId: { type: integer }
              required: [brandId]
      responses:
        "200":
          description: Scan result with per-platform status
          content:
            application/json:
              schema:
                type: object
                properties:
                  weekStart: { type: string }
                  statuses:
                    type: array
                    items:
                      type: object
                      properties:
                        platform: { type: string }
                        active: { type: boolean }
                        reason: { type: ["string", "null"] }
                      required: [platform, active]
                  inserted:
                    type: array
                    items: { $ref: "#/components/schemas/AdsPerformanceRow" }
                required: [weekStart, statuses, inserted]
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-performance:
    get:
      operationId: listAdsPerformance
      tags: [adsPerformance]
      summary: List ads performance rows
      parameters:
        - name: brandId
          in: query
          required: false
          schema: { type: integer }
        - name: platform
          in: query
          required: false
          schema: { type: string, enum: [facebook, tiktok, google] }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 300, default: 100 }
      responses:
        "200":
          description: Rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdsPerformanceRow" }

  /ads-performance/summary:
    get:
      operationId: getAdsPerformanceSummary
      tags: [adsPerformance]
      summary: Cross-platform blended ROAS + reallocation suggestion
      parameters:
        - name: brandId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { type: object, additionalProperties: true }
                  suggestion:
                    oneOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
                required: [summary]

  # ── Content Pipeline (Phase F) ──────────────────────────────────────────────
  /content-pipeline/generate:
    post:
      operationId: generateContentPipeline
      tags: [contentPipeline]
      summary: Generate a caption + image/video prompts draft (optional Metricool push)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brandId: { type: integer }
                topic: { type: string }
                platform: { type: ["string", "null"] }
                trendInsightId: { type: ["integer", "null"] }
                strategyInboxId: { type: ["integer", "null"] }
                pushMetricool: { type: boolean, default: false }
              required: [brandId, topic]
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan: { $ref: "#/components/schemas/ContentPlan" }
                  metricool:
                    oneOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
                required: [plan]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Virtual KOL (Phase H) ───────────────────────────────────────────────────
  /virtual-kol/characters:
    get:
      operationId: listKolCharacters
      tags: [virtualKol]
      summary: List the AI KOL characters
      responses:
        "200":
          description: Characters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KolCharacter" }

  /virtual-kol/posts:
    get:
      operationId: listKolPosts
      tags: [virtualKol]
      summary: List generated KOL posts
      parameters:
        - name: characterId
          in: query
          required: false
          schema: { type: integer }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KolPost" }

  /virtual-kol/generate:
    post:
      operationId: generateKolPost
      tags: [virtualKol]
      summary: Generate a KOL post (script + caption + media prompts; TTS/video gated by keys)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                characterId: { type: integer }
                topic: { type: string }
              required: [characterId, topic]
      responses:
        "201":
          description: Generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  post: { $ref: "#/components/schemas/KolPost" }
                  voice:
                    oneOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
                required: [post]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Brand:
      type: object
      properties:
        id:
          type: integer
        brandName:
          type: string
        industry:
          type: string
        branchLocation:
          type: string
        targetAudience:
          type: string
        brandVoice:
          type: string
        websiteUrl:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        tiktokUrl:
          type: ["string", "null"]
        googlePlaceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - brandName
        - industry
        - branchLocation
        - targetAudience
        - brandVoice
        - websiteUrl
        - facebookUrl
        - instagramUrl
        - tiktokUrl
        - googlePlaceId
        - createdAt
        - updatedAt

    CreateBrandBody:
      type: object
      properties:
        brandName:
          type: string
        industry:
          type: string
        branchLocation:
          type: string
        targetAudience:
          type: string
        brandVoice:
          type: string
        websiteUrl:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        tiktokUrl:
          type: ["string", "null"]
        googlePlaceId:
          type: ["string", "null"]
      required:
        - brandName
        - industry
        - branchLocation
        - targetAudience
        - brandVoice

    Review:
      type: object
      properties:
        id:
          type: integer
        brandId:
          type: integer
        reviewerName:
          type: string
        rating:
          type: integer
        reviewText:
          type: ["string", "null"]
        reviewDate:
          type: string
          format: date-time
        replied:
          type: boolean
        replyText:
          type: ["string", "null"]
        replyDate:
          type: ["string", "null"]
          format: date-time
        googleReviewId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - brandId
        - reviewerName
        - rating
        - reviewText
        - reviewDate
        - replied
        - replyText
        - replyDate
        - googleReviewId
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        brandId:
          type: integer
        reviewerName:
          type: string
        rating:
          type: integer
        reviewText:
          type: ["string", "null"]
        reviewDate:
          type: string
          format: date-time
        googleReviewId:
          type: ["string", "null"]
      required:
        - brandId
        - reviewerName
        - rating
        - reviewDate

    ReviewReplyResponse:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply

    SaveReplyBody:
      type: object
      properties:
        replyText:
          type: string
      required:
        - replyText

    ReviewStats:
      type: object
      properties:
        brandId:
          type: integer
        brandName:
          type: string
        totalReviews:
          type: integer
        averageRating:
          type: number
        repliedCount:
          type: integer
        unrepliedCount:
          type: integer
        rating1Count:
          type: integer
        rating2Count:
          type: integer
        rating3Count:
          type: integer
        rating4Count:
          type: integer
        rating5Count:
          type: integer
      required:
        - brandId
        - brandName
        - totalReviews
        - averageRating
        - repliedCount
        - unrepliedCount
        - rating1Count
        - rating2Count
        - rating3Count
        - rating4Count
        - rating5Count

    GenerateContentBody:
      type: object
      properties:
        brandId:
          type: integer
        platform:
          type: string
        contentType:
          type: string
        topic:
          type: string
        campaignGoal:
          type: string
        additionalContext:
          type: ["string", "null"]
      required:
        - brandId
        - platform
        - contentType
        - topic
        - campaignGoal

    GeneratedContent:
      type: object
      properties:
        hooks:
          type: array
          items:
            type: string
        mainCaption:
          type: string
        shortCaption:
          type: string
        cta:
          type: string
        hashtags:
          type: array
          items:
            type: string
        imagePrompt:
          type: string
        videoPrompt:
          type: string
        visualStyle:
          type: string
      required:
        - hooks
        - mainCaption
        - shortCaption
        - cta
        - hashtags
        - imagePrompt
        - videoPrompt
        - visualStyle

    GenerateStrategyBody:
      type: object
      properties:
        brandId:
          type: integer
        campaignGoal:
          type: string
        platform:
          type: string
        duration:
          type: string
      required:
        - brandId
        - campaignGoal
        - platform

    MarketingStrategy:
      type: object
      properties:
        marketingModel:
          type: string
        reasoning:
          type: string
        campaignAngle:
          type: string
        funnelStage:
          type: string
        targetEmotion:
          type: string
        ctaStrategy:
          type: string
        suggestedTopics:
          type: array
          items:
            type: string
      required:
        - marketingModel
        - reasoning
        - campaignAngle
        - funnelStage
        - targetEmotion
        - ctaStrategy
        - suggestedTopics

    ContentPlan:
      type: object
      properties:
        id:
          type: integer
        brandId:
          type: integer
        publishDate:
          type: string
          format: date-time
        platform:
          type: string
        contentType:
          type: string
        hook:
          type: ["string", "null"]
        caption:
          type: ["string", "null"]
        shortCaption:
          type: ["string", "null"]
        cta:
          type: ["string", "null"]
        hashtags:
          type: ["string", "null"]
        imagePrompt:
          type: ["string", "null"]
        videoPrompt:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        topic:
          type: string
        status:
          type: string

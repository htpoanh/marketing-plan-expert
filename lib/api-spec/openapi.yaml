    # ── Brand ads context ───────────────────────────────────────────────────
    BrandAdsContext:
      type: object
      description: Free-form brand metadata used to ground Ads Strategy Agent prompts.
      properties:
        uniqueSellingPoints:
          type: array
          items: { type: string }
        competitors:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              url: { type: ["string", "null"] }
              notes: { type: ["string", "null"] }
            required: [name]
        pricePositioning:
          type: ["string", "null"]
          enum: [budget, mid, premium, luxury, null]
        bookingUrl: { type: ["string", "null"] }
        metaPixelId: { type: ["string", "null"] }
        googleAdsCustomerId: { type: ["string", "null"] }
        primaryRegions:
          type: array
          items: { type: string }
        excludedRegions:
          type: array
          items: { type: string }
        primaryLanguages:
          type: array
          items: { type: string }
        notes: { type: ["string", "null"] }

    BrandAdsContextEnvelope:
      type: object
      description: Wraps ads_context with the two scalar columns we put on brands at the same time.
      properties:
        brandId: { type: integer }
        adsContext:
          oneOf:
            - $ref: "#/components/schemas/BrandAdsContext"
            - type: "null"
        serviceRadiusKm: { type: ["integer", "null"] }
        avgTicketSizeEur:
          type: ["string", "null"]
          description: Decimal(10,2) returned as string for precision
        updatedAt: { type: string, format: date-time }
      required:
        - brandId
        - adsContext
        - serviceRadiusKm
        - avgTicketSizeEur
        - updatedAt

    UpdateBrandAdsContextBody:
      type: object
      properties:
        adsContext:
          oneOf:
            - $ref: "#/components/schemas/BrandAdsContext"
            - type: "null"
        serviceRadiusKm: { type: ["integer", "null"] }
        avgTicketSizeEur:
          type: ["string", "null"]
          description: Decimal(10,2) as string (e.g. "45.00")

    # ── Ads Strategy Agent ──────────────────────────────────────────────────
    AdsModule:
      type: string
      enum: [audience, keyword, performance, trend]
      description: Which Ads Strategy module produced the report

    AdsAiProvider:
      type: string
      enum: [anthropic, google, openai, xai]

    AdsReport:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: integer }
        module: { $ref: "#/components/schemas/AdsModule" }
        input:
          type: object
          additionalProperties: true
          description: Raw input the user submitted (form values + brand snapshot)
        output:
          type: object
          additionalProperties: true
          description: AI-generated, schema-validated output. Shape depends on `module`.
        aiProvider: { $ref: "#/components/schemas/AdsAiProvider" }
        aiModel: { type: string }
        tokensInput: { type: ["integer", "null"] }
        tokensOutput: { type: ["integer", "null"] }
        costEur: { type: ["string", "null"], description: "Decimal(10,4) as string for precision" }
        latencyMs: { type: ["integer", "null"] }
        userNotes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - brandId
        - module
        - input
        - output
        - aiProvider
        - aiModel
        - tokensInput
        - tokensOutput
        - costEur
        - latencyMs
        - userNotes
        - createdAt
        - updatedAt

    GenerateAdsAudienceBody:

    TrendInsightStatus:
      type: string
      enum: [new, proposed, backlog, skipped, actioned]

    TrendFactors:
      type: object
      properties:
        trendStrength: { type: number }
        relevance: { type: number }
        strategyAlignment: { type: number }
        productionDifficulty: { type: number }
      required: [trendStrength, relevance, strategyAlignment, productionDifficulty]

    TrendInsight:
      type: object
      properties:
        id: { type: integer }
        brandId: { type: ["integer", "null"] }
        trendName: { type: string }
        description: { type: ["string", "null"] }
        source: { type: ["string", "null"] }
        trendScore: { type: string, description: "Decimal(6,1) as string" }
        factors:
          oneOf:
            - $ref: "#/components/schemas/TrendFactors"
            - type: "null"
        momentum: { type: ["string", "null"] }
        estimatedWindowDays: { type: ["integer", "null"] }
        suggestedAngle: { type: ["string", "null"] }
        suggestedKeywords:
          type: ["array", "null"]
          items: { type: string }
        strategyAlignmentNote: { type: ["string", "null"] }
        recommendedAction: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/TrendInsightStatus" }
        weekNumber: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:

openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Marketing Strategist Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pipeline
    description: Full AI agent pipeline (Trend → Strategy → Content → Prompts → Save)
  - name: brands
    description: Brand and store management
  - name: reviews
    description: Google Reviews management and auto-reply
  - name: content
    description: AI content generation
  - name: contentPlans
    description: Content calendar and planning
  - name: approvals
    description: Content approval workflow
  - name: strategy
    description: AI marketing strategy generation
  - name: adsStrategy
    description: Ads Strategy Agent (M1 Audience, M2 Keywords, M3 Performance, M4 Trend)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pipeline/run:
    post:
      operationId: runPipeline
      tags: [pipeline]
      summary: Run full AI agent pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPipelineBody"
      responses:
        "200":
          description: Pipeline completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pipeline/runs:
    get:
      operationId: listPipelineRuns
      tags: [pipeline]
      summary: List pipeline run history
      parameters:
        - name: brandId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of pipeline runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineRun"

  /pipeline/runs/{id}:
    get:
      operationId: getPipelineRun
      tags: [pipeline]
      summary: Get pipeline run by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pipeline run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePipelineRun
      tags: [pipeline]
      summary: Delete pipeline run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /pipeline/marketing-models:
    get:
      operationId: listMarketingModels
      tags: [pipeline]
      summary: List all built-in marketing models
      responses:
        "200":
          description: Marketing models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketingModel"

  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: List all brands/stores
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a new brand/store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "201":
          description: Created brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBrand
      tags: [brands]
      summary: Update brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBrand
      tags: [brands]
      summary: Delete brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List all Google reviews
      parameters:
        - name: brandId
          in: query
          required: false
          schema:
            type: integer
        - name: rating
          in: query
          required: false
          schema:
            type: integer
        - name: replied
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Add a Google review manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    get:
      operationId: getReview
      tags: [reviews]
      summary: Get review by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /reviews/{id}/generate-reply:
    post:
      operationId: generateReviewReply
      tags: [reviews]
      summary: Generate AI reply for a review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewReplyResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{id}/reply:
    post:
      operationId: saveReviewReply
      tags: [reviews]
      summary: Save and mark review as replied
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveReplyBody"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/stats:
    get:
      operationId: getReviewStats
      tags: [reviews]
      summary: Get review statistics per brand
      parameters:
        - name: brandId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Review statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewStats"

  /content/generate:
    post:
      operationId: generateContent
      tags: [content]
      summary: Generate AI marketing content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContentBody"
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContent"

  /content/strategy:
    post:
      operationId: generateStrategy
      tags: [strategy]
      summary: Generate AI marketing strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStrategyBody"
      responses:
        "200":
          description: Generated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingStrategy"

  /content-plans:
    get:
      operationId: listContentPlans
      tags: [contentPlans]
      summary: List content plans
      parameters:
        - name: brandId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of content plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentPlan"
    post:
      operationId: createContentPlan
      tags: [contentPlans]
      summary: Create content plan item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentPlanBody"
      responses:
        "201":
          description: Created content plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"

  /content-plans/generate:
    post:
      operationId: generateContentPlan
      tags: [contentPlans]
      summary: Generate a 7 or 30-day AI content plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContentPlanBody"
      responses:
        "200":
          description: Generated content plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentPlan"

  /content-plans/{id}:
    get:
      operationId: getContentPlan
      tags: [contentPlans]
      summary: Get content plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContentPlan
      tags: [contentPlans]
      summary: Update content plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentPlanBody"
      responses:
        "200":
          description: Updated content plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContentPlan
      tags: [contentPlans]
      summary: Delete content plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content-plans/{id}/approve:
    post:
      operationId: approveContentPlan
      tags: [approvals]
      summary: Approve content plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"

  /content-plans/{id}/reject:
    post:
      operationId: rejectContentPlan
      tags: [approvals]
      summary: Reject content plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"

  /content-plans/{id}/publish:
    post:
      operationId: publishContentPlan
      tags: [approvals]
      summary: Publish to Metricool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentPlan"

  # ── Ads Strategy Agent ──────────────────────────────────────────────────────
  /brands/{id}/ads-context:
    get:
      operationId: getBrandAdsContext
      tags: [brands]
      summary: Get the ads_context JSONB blob (+ service_radius_km + avg_ticket_size_eur) for one brand
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Brand ads context (may be empty if not yet edited)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAdsContextEnvelope"
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBrandAdsContext
      tags: [brands]
      summary: Update the ads_context JSONB + radius + ticket fields for one brand
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrandAdsContextBody"
      responses:
        "200":
          description: Updated context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandAdsContextEnvelope"
        "404":
          description: Brand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/audience:
    post:
      operationId: generateAdsAudience
      tags: [adsStrategy]
      summary: M1 — Generate audience targeting (personas + Meta/Google JSON)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAdsAudienceBody"
      responses:
        "200":
          description: Audience report generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Module not yet implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/keywords:
    post:
      operationId: generateAdsKeywords
      tags: [adsStrategy]
      summary: M2 — Generate weighted keyword groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAdsKeywordsBody"
      responses:
        "200":
          description: Keyword report generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Module not yet implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/performance:
    post:
      operationId: analyzeAdsPerformance
      tags: [adsStrategy]
      summary: M3 — Analyze ads CSV (Meta/Google) and recommend budget reallocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeAdsPerformanceBody"
      responses:
        "200":
          description: Performance report generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Module not yet implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/trend:
    post:
      operationId: getAdsTrendPulse
      tags: [adsStrategy]
      summary: M4 — Real-time trend pulse (Grok with web search)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetAdsTrendBody"
      responses:
        "200":
          description: Trend report generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Module not yet implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/reports:
    get:
      operationId: listAdsReports
      tags: [adsStrategy]
      summary: List saved ads reports (filterable)
      parameters:
        - name: brandId
          in: query
          required: false
          schema: { type: integer }
        - name: module
          in: query
          required: false
          schema:
            type: string
            enum: [audience, keyword, performance, trend]
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: List of reports (most recent first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdsReport"

  /ads-strategy/reports/{id}:
    get:
      operationId: getAdsReport
      tags: [adsStrategy]
      summary: Get a single ads report
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdsReport
      tags: [adsStrategy]
      summary: Update user notes on a report (only field that's user-mutable)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdsReportBody"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdsReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdsReport
      tags: [adsStrategy]
      summary: Delete a saved report
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ads-strategy/cost-summary:
    get:
      operationId: getAdsCostSummary
      tags: [adsStrategy]
      summary: Aggregate AI cost grouped by provider + model for a time window
      parameters:
        - name: brandId
          in: query
          required: false
          schema: { type: integer }
        - name: since
          in: query
          required: false
          description: ISO date — start of window. Defaults to start of current month.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Cost summary buckets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdsCostBucket"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Brand:
      type: object
      properties:
        id:
          type: integer
        brandName:
          type: string
        industry:
          type: string
        branchLocation:
          type: string
        targetAudience:
          type: string
        brandVoice:
          type: string
        websiteUrl:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        tiktokUrl:
          type: ["string", "null"]
        googlePlaceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - brandName
        - industry
        - branchLocation
        - targetAudience
        - brandVoice
        - websiteUrl
        - facebookUrl
        - instagramUrl
        - tiktokUrl
        - googlePlaceId
        - createdAt
        - updatedAt

    CreateBrandBody:
      type: object
      properties:
        brandName:
          type: string
        industry:
          type: string
        branchLocation:
          type: string
        targetAudience:
          type: string
        brandVoice:
          type: string
        websiteUrl:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        tiktokUrl:
          type: ["string", "null"]
        googlePlaceId:
          type: ["string", "null"]
      required:
        - brandName
        - industry
        - branchLocation
        - targetAudience
        - brandVoice

    Review:
      type: object
      properties:
        id:
          type: integer
        brandId:
          type: integer
        reviewerName:
          type: string
        rating:
          type: integer
        reviewText:
          type: ["string", "null"]
        reviewDate:
          type: string
          format: date-time
        replied:
          type: boolean
        replyText:
          type: ["string", "null"]
        replyDate:
          type: ["string", "null"]
          format: date-time
        googleReviewId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - brandId
        - reviewerName
        - rating
        - reviewText
        - reviewDate
        - replied
        - replyText
        - replyDate
        - googleReviewId
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        brandId:
          type: integer
        reviewerName:
          type: string
        rating:
          type: integer
        reviewText:
          type: ["string", "null"]
        reviewDate:
          type: string
          format: date-time
        googleReviewId:
          type: ["string", "null"]
      required:
        - brandId
        - reviewerName
        - rating
        - reviewDate

    ReviewReplyResponse:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply

    SaveReplyBody:
      type: object
      properties:
        replyText:
          type: string
      required:
        - replyText

    ReviewStats:
      type: object
      properties:
        brandId:
          type: integer
        brandName:
          type: string
        totalReviews:
          type: integer
        averageRating:
          type: number
        repliedCount:
          type: integer
        unrepliedCount:
          type: integer
        rating1Count:
          type: integer
        rating2Count:
          type: integer
        rating3Count:
          type: integer
